<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pen and Ink</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141414; --soft:#8a8a8a; --line:#e6e6e3;
    --sans:'SF Pro Display','Helvetica Neue','Segoe UI',Arial,sans-serif;
    --mono:'SF Mono','JetBrains Mono','Consolas',monospace;
    --script:'Great Vibes',cursive;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--sans);color:var(--ink);background:#0b0b0b;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .hide{display:none!important}

  /* LOADER */
  .loader{position:fixed;inset:0;z-index:60;background:#fcfcfb;display:flex;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
  .loader.done{opacity:0;visibility:hidden}
  .loader .lwrap{display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;animation:fin .9s ease .1s forwards}
  .loader img{height:78px;width:auto}
  .loader .fb{display:flex;align-items:center;gap:14px}
  .loader .fb svg{width:34px;color:var(--ink)}
  .loader .fb b{font-family:var(--script);font-size:54px}
  .loader .ln{width:150px;height:1px;background:var(--line);overflow:hidden}
  .loader .ln i{display:block;height:100%;width:0;background:var(--ink);animation:ffill 1.2s ease forwards}
  @keyframes fin{to{opacity:1}}@keyframes ffill{to{width:100%}}

  /* TRANSPARENT NAV */
  .nav{position:fixed;top:0;left:0;right:0;z-index:40;height:72px;display:flex;align-items:center;justify-content:space-between;
       padding:0 40px;background:transparent;border:none}
  .brand{display:flex;align-items:center;gap:11px;height:100%}
  .brand .logo-img{height:46px;width:auto;filter:brightness(0) invert(1)}
  .brand .fb{display:flex;align-items:center;gap:10px}
  .brand .fb svg{width:19px;color:#fff}
  .brand .fb .nm{font-family:var(--script);font-size:26px;line-height:1;color:#fff}
  /* Menu pinned to absolute center of nav */
  .menu{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px;list-style:none;white-space:nowrap}
  .menu a{display:block;padding:9px 15px;font-size:13px;color:#fff;font-weight:700;letter-spacing:.02em;border-radius:7px;transition:background .2s}
  .menu a:hover{background:rgba(255,255,255,.14)}
  .navright{display:flex;align-items:center}
  .burger{display:none;background:none;border:none;font-size:24px;color:#fff}

  /* FULLSCREEN SLIDESHOW */
  .show{position:fixed;inset:0;z-index:10;background:#0b0b0b}
  .slide{position:absolute;inset:0;opacity:0;transition:opacity 1.5s ease}
  .slide.on{opacity:1}
  /* Alternating horizontal pan — odd slides drift L→R, even R→L */
  .slide img{width:100%;height:100%;object-fit:cover;transform:scale(1.05) translateX(-2%);transition:transform 8s ease}
  .slide.on img{transform:scale(1.05) translateX(2%)}
  .slide:nth-child(even) img{transform:scale(1.05) translateX(2%)}
  .slide:nth-child(even).on img{transform:scale(1.05) translateX(-2%)}
  /* top dark vignette for nav legibility; bottom for caption */
  .show::before{content:"";position:absolute;left:0;right:0;top:0;height:180px;z-index:3;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 100%)}
  .show::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,0,0,0) 50%,rgba(0,0,0,.5) 100%)}

  /* ONE-WORD CAPTION — bottom left */
  .word{position:fixed;left:44px;bottom:46px;z-index:30;color:#fff;
    font-size:clamp(22px,3.2vw,56px);font-weight:600;letter-spacing:-.02em;line-height:.9;
    text-shadow:0 2px 20px rgba(0,0,0,.4);opacity:0;transform:translateY(10px);transition:opacity .9s ease,transform .9s ease}
  .word.in{opacity:1;transform:none}
  .dots{position:fixed;left:46px;bottom:calc(46px + clamp(22px,3.2vw,56px) + 16px);z-index:30;display:flex;gap:7px;align-items:center}
  .dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .45s,transform .45s;cursor:default}
  .dot.on{background:rgba(255,255,255,.88);transform:scale(1.4)}

  /* slim bottom progress */
  .prog{position:fixed;left:0;right:0;bottom:0;height:2px;z-index:30;background:rgba(255,255,255,.18)}
  .prog i{display:block;height:100%;width:0;background:rgba(255,255,255,.9)}
  .prog i.run{width:100%;transition:width 5s linear}

  @media(max-width:760px){
    .nav{padding:0 20px;height:62px}.menu{display:none}.burger{display:block}
    .brand .logo-img{height:36px}
    .word{left:22px;bottom:28px;font-size:clamp(20px,6vw,40px)}
    .dots{left:24px;bottom:calc(28px + clamp(20px,6vw,40px) + 14px)}
  }
</style>
</head>
<body>
  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="lwrap">
      <img src="assets/logo.png" alt="Pen and Ink" onerror="this.classList.add('hide');this.nextElementSibling.classList.remove('hide')">
      <div class="fb hide"><svg viewBox="0 0 70 92" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M 3,32 C 18,18 38,14 58,22 C 64,25 66,28 64,32" stroke="currentColor" stroke-width="7" stroke-linecap="round"/><path d="M 16,22 C 14,34 11,48 8,62 C 5,74 2,84 0,91" stroke="currentColor" stroke-width="6.5" stroke-linecap="round"/><path d="M 50,20 C 52,32 53,47 55,62 C 58,74 63,84 68,91" stroke="currentColor" stroke-width="6.5" stroke-linecap="round"/></svg><b>Pen and Ink</b></div>
      <div class="ln"><i></i></div>
    </div>
  </div>

  <!-- STATIC NAV -->
  <nav class="nav">
    <a class="brand" href="#">
      <img src="assets/logo.png" alt="Pen and Ink" class="logo-img" onerror="this.classList.add('hide');this.nextElementSibling.classList.remove('hide')">
      <span class="fb hide"><svg viewBox="0 0 70 92" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M 3,32 C 18,18 38,14 58,22 C 64,25 66,28 64,32" stroke="currentColor" stroke-width="7" stroke-linecap="round"/><path d="M 16,22 C 14,34 11,48 8,62 C 5,74 2,84 0,91" stroke="currentColor" stroke-width="6.5" stroke-linecap="round"/><path d="M 50,20 C 52,32 53,47 55,62 C 58,74 63,84 68,91" stroke="currentColor" stroke-width="6.5" stroke-linecap="round"/></svg><span class="nm">Pen and Ink</span></span>
    </a>
    <div class="navright">
      <ul class="menu">
        <li><a href="#">About Us</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Our Work</a></li>
        <li><a href="#">Office</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>
      <button class="burger">≡</button>
    </div>
  </nav>

  <!-- SLIDESHOW -->
  <main class="show" id="show">
    <div class="slide on"><img src="assets/mono/i01.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i02.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i03.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i04.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i05.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i06.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i07.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i08.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i09.jpg" alt=""></div>
    <div class="slide"><img src="assets/mono/i10.jpg" alt=""></div>
  </main>

  <div class="dots" id="dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div class="word in" id="word">Light</div>
  <div class="prog" id="prog"><i id="progi"></i></div>

<script>
  const hideLoader=()=>document.getElementById('loader').classList.add('done');
  window.addEventListener('load',()=>setTimeout(hideLoader,1200));setTimeout(hideLoader,2800);

  const words=['Light','Still','Shelter','Grain','Depth','Form','Craft','Tone','Void','Ground'];
  const slides=[...document.querySelectorAll('.slide')];
  const dotEls=[...document.querySelectorAll('.dot')];
  const word=document.getElementById('word'),progi=document.getElementById('progi');
  let i=0,timer;
  function paint(){
    slides.forEach((s,k)=>s.classList.toggle('on',k===i));
    dotEls.forEach((d,k)=>d.classList.toggle('on',k===i));
    word.classList.remove('in');
    setTimeout(()=>{word.textContent=words[i];word.classList.add('in');},260);
    progi.classList.remove('run');void progi.offsetWidth;progi.classList.add('run');
  }
  function go(k){i=(k+slides.length)%slides.length;paint();restart();}
  function restart(){clearInterval(timer);timer=setInterval(()=>go(i+1),5000);}
  // first run
  paint();restart();
  addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(i+1);if(e.key==='ArrowLeft')go(i-1);});
</script>
</body>
</html>
