<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pen and Ink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141414; --soft:#8a8a8a; --line:#e6e6e3;
    --sans:'Futura','Jost','Century Gothic','Trebuchet MS',Arial,sans-serif;
    --script:'Great Vibes',cursive;
    --display:'Futura','Jost','Century Gothic','Trebuchet MS',Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--sans);color:var(--ink);background:#111;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  img{-webkit-user-drag:none;user-drag:none;-webkit-touch-callout:none}
  .hide{display:none!important}

  /* LOADER */
  .loader{position:fixed;inset:0;z-index:70;
    background:linear-gradient(155deg,#111 0%,#1d1d1d 35%,#0a0a0a 65%,#181818 100%);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    transition:opacity .6s ease,visibility .6s}
  .loader.done{opacity:0;visibility:hidden}
  .lw{display:flex;flex-direction:column;align-items:center;gap:26px}
  .lw img{height:150px;width:auto;filter:brightness(0) invert(1);animation:lrise .7s cubic-bezier(.22,1,.36,1) both}
  @keyframes lrise{from{transform:translateY(55vh);opacity:0;filter:brightness(0) invert(1) blur(3px)}to{transform:translateY(0);opacity:1;filter:brightness(0) invert(1) blur(0)}}
  .ltype{font-family:var(--display);font-style:normal;font-weight:400;
    font-size:18px;letter-spacing:.12em;text-transform:uppercase;
    color:rgba(255,255,255,.72);text-align:center;line-height:1.7;
    max-width:660px;opacity:0;transition:opacity 1s ease}
  .ltype.vis{opacity:1}

  /* ── CONSTANT TRANSPARENT NAV (shared across all pages) ── */
  .nav{position:fixed;top:0;left:0;right:0;z-index:60;height:88px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:transparent;border:none}
  .nav::before{content:"";position:absolute;left:0;right:0;top:0;bottom:-52px;z-index:-1;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,.22) 45%,rgba(0,0,0,0) 100%);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);-webkit-mask:linear-gradient(180deg,#000 35%,transparent 100%);mask:linear-gradient(180deg,#000 35%,transparent 100%)}
  .brand{display:flex;align-items:center;height:100%}
  .brand img{height:54px;width:auto;display:block;filter:drop-shadow(0 1px 6px rgba(0,0,0,.45))}
  .navright{display:flex;align-items:center}
  .menu{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px;list-style:none;white-space:nowrap}
  .menu a{display:block;padding:10px 17px;font-size:15px;color:#fff;font-weight:600;letter-spacing:.02em;transition:text-shadow .25s;text-shadow:0 1px 10px rgba(0,0,0,.4)}
  .menu a:hover{text-shadow:0 0 22px rgba(255,255,255,.9),0 1px 8px rgba(0,0,0,.3)}
  .menu a.active{text-shadow:0 0 18px rgba(255,255,255,.65)}
  .burger{display:none;background:none;border:none;font-size:26px;color:#fff;cursor:pointer}

  /* FULLSCREEN SLIDESHOW */
  .show{position:fixed;inset:0;z-index:10;background:#111}
  .slide{position:absolute;inset:0;opacity:0;transition:opacity .9s ease}
  .slide.on{opacity:1}
  .slide img{width:100%;height:100%;object-fit:cover;transform:scale(1.02) translateX(0%);transition:transform 18s linear;
    filter:grayscale(1) contrast(1.06) brightness(.96)}
  .slide.on img{transform:scale(1.02) translateX(0.5%)}
  /* soft grey veil — nav legibility */
  .show::before{content:"";position:absolute;left:0;right:0;top:0;height:120px;z-index:3;pointer-events:none;
    background:linear-gradient(180deg,rgba(30,30,30,.34) 0%,rgba(0,0,0,0) 100%)}
  .show::after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,0,0,0) 48%,rgba(0,0,0,.52) 100%)}

  /* WORD — Cormorant Garamond, luxury screaming size */
  .word{position:fixed;left:52px;bottom:52px;z-index:30;color:#fff;
    font-family:var(--display);font-style:normal;font-weight:600;
    font-size:clamp(20px,3vw,54px);letter-spacing:.01em;line-height:.85;
    text-shadow:0 2px 28px rgba(0,0,0,.35);
    opacity:0;transform:translateY(12px);transition:opacity .85s ease,transform .85s ease}
  .word.in{opacity:1;transform:none}

  @media(max-width:780px){
    .nav{padding:0 22px;height:70px}.menu{display:none}.burger{display:block}
    .brand img{height:44px}
    .loader img{height:120px}
    .word{left:24px;bottom:32px;font-size:clamp(18px,6vw,38px)}
  }

  /* ── MOBILE MENU OVERLAY ── */
  .mob{position:fixed;inset:0;z-index:200;
    background:rgba(4,4,4,.93);
    backdrop-filter:blur(28px) saturate(.4);
    -webkit-backdrop-filter:blur(28px) saturate(.4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .3s ease}
  .mob.open{opacity:1;pointer-events:all}
  .mob-x{position:absolute;top:clamp(18px,3vw,28px);right:clamp(20px,3vw,32px);
    background:none;border:none;color:rgba(255,255,255,.5);
    font-size:28px;cursor:pointer;line-height:1;
    transition:color .2s,transform .2s}
  .mob-x:hover{color:#fff;transform:rotate(90deg)}
  .mob-links{display:flex;flex-direction:column;align-items:center;gap:4px}
  .mob-links a{
    font-family:var(--display);font-style:italic;font-weight:300;
    font-size:clamp(38px,9vw,72px);
    color:rgba(255,255,255,.55);letter-spacing:.02em;line-height:1.25;
    transition:color .2s,letter-spacing .25s}
  .mob-links a:hover,.mob-links a.active{color:#fff;letter-spacing:.04em}
  .mob-rule{width:40px;height:1px;background:var(--gold,#b8975a);opacity:.5;margin:18px auto}
  /* keep navbar fonts as-is */
  .menu a,.burger{font-family:'SF Pro Display','Helvetica Neue','Segoe UI',Arial,sans-serif}
  .mob-links a{font-family:'Cormorant Garamond',serif}
  .mob-logo{padding:0!important}
  .mob-logo img{height:64px;width:auto;margin-bottom:10px;filter:drop-shadow(0 1px 6px rgba(0,0,0,.5))}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="lw">
    <img src="assets/loader-pi.png" alt="Pen and Ink">
    <div class="ltype" id="ltype"></div>
  </div>
</div>

<!-- CONSTANT TRANSPARENT NAV -->
<nav class="nav">
  <a class="brand" href="index.html">
    <img src="assets/logo-white.png" alt="Pen and Ink — design studio">
  </a>
  <ul class="menu">
    <li><a href="about.html">Our Philosophy</a></li>
    <li><a href="our-work.html">Our Work</a></li>
    <li><a href="contact.html">Our Studio</a></li>
  </ul>
  <div class="navright"><button class="burger">&#9776;</button></div>
</nav>

<!-- SLIDESHOW -->
<main class="show" id="show">
  <div class="slide on"><img src="assets/projects/bishop-garden/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/kanathur-residence/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/utsav-banquet-hall/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/institutional-campus/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/kumaran-sports-complex/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/murali-villa/2.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/padappai-residence/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/palavakkam-padel/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/panaiyur-residence/2.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/proposed-development/2.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/proposed-development/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/ethereal-earth/2.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/qsr-pavilion/1.jpg" alt=""></div>
  <div class="slide"><img src="assets/projects/rela-hospital/2.jpg" alt=""></div>
</main>

<div class="word in" id="word">Light</div>

<!-- MOBILE MENU -->
<div class="mob" id="mob">
  <nav class="mob-links">
    <a href="index.html" class="mob-logo"><img src="assets/logo-white.png" alt="Pen and Ink"></a>
    <div class="mob-rule"></div>
    <a href="about.html">Our Philosophy</a>
    <a href="our-work.html">Our Work</a>
    <a href="contact.html">Our Studio</a>
  </nav>
</div>

<script>
  // Mobile menu
  (function(){
    const mob=document.getElementById('mob');
    document.querySelector('.burger').addEventListener('click',()=>mob.classList.add('open'));
    mob.addEventListener('click',e=>{if(e.target===mob)mob.classList.remove('open');});
  })();
  // disable image downloading
  ['contextmenu','dragstart'].forEach(ev=>document.addEventListener(ev,e=>{if(e.target.tagName==='IMG')e.preventDefault();}));

  // Loader: logo rises from bottom, text fades in below
  (function(){
    const loader = document.getElementById('loader');
    const ltEl   = document.getElementById('ltype');
    ltEl.innerHTML = 'Every Space Has a Pulse.<br>Every Building Has a Voice.';
    setTimeout(()=>ltEl.classList.add('vis'), 700);
    setTimeout(()=>loader.classList.add('done'), 3000);
  })();

  const words=['Garden','Haven','Utsav','Campus','Arena','Villa','Threshold','Court','Shore','Crown','Vision','Ethereal','Pavilion','Care'];
  const slides=[...document.querySelectorAll('.slide')];
  const word=document.getElementById('word');
  let i=Math.floor(Math.random()*slides.length), timer, goTimer;
  // activate random starting slide
  slides.forEach(s=>s.classList.remove('on'));
  slides[i].classList.add('on');

  function go(k){
    const prev=i;
    i=(k+slides.length)%slides.length;
    // freeze outgoing image to prevent backward drift
    const prevImg=slides[prev].querySelector('img');
    const frozen=getComputedStyle(prevImg).transform;
    prevImg.style.transition='none';
    prevImg.style.transform=frozen;
    slides[prev].classList.remove('on');
    word.classList.remove('in');
    clearTimeout(goTimer);
    goTimer=setTimeout(()=>{
      prevImg.style.transform='scale(1.02) translateX(0%)';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{prevImg.style.transition='';}));
      slides[i].classList.add('on');
      setTimeout(()=>{word.textContent=words[i];word.classList.add('in');},200);
    },500);
    restart();
  }
  function restart(){clearInterval(timer);timer=setInterval(()=>go(i+1),5500);}
  word.textContent=words[i]; word.classList.add('in');
  restart();
  addEventListener('keydown',e=>{
    if(e.key==='ArrowRight')go(i+1);
    if(e.key==='ArrowLeft')go(i-1);
  });
</script>
</body>
</html>
