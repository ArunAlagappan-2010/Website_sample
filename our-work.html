<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Work — Pen and Ink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --soft:#b9b6b0;--nav-h:88px;
    --sans:'Futura','Jost','Century Gothic','Trebuchet MS',Arial,sans-serif;
    --display:'Futura','Jost','Century Gothic','Trebuchet MS',Arial,sans-serif;
    --gold:#b8975a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;background:#0d0d0d;color:#fff;
    font-family:var(--sans);-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  img{display:block;-webkit-user-drag:none;user-drag:none;-webkit-touch-callout:none}

  /* ── NAV ── */
  .nav{position:fixed;top:0;left:0;right:0;z-index:60;height:var(--nav-h);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 48px;background:transparent;
    transition:background .4s,backdrop-filter .4s,-webkit-backdrop-filter .4s}
  .nav::before{content:"";position:absolute;left:0;right:0;top:0;bottom:-52px;z-index:-1;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.24) 45%,rgba(0,0,0,0) 100%);
    backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
    -webkit-mask:linear-gradient(180deg,#000 35%,transparent 100%);mask:linear-gradient(180deg,#000 35%,transparent 100%)}
  .lb-open .nav{background:rgba(0,0,0,.15);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  .brand{display:flex;align-items:center;height:100%}
  .brand img{height:54px;width:auto;filter:drop-shadow(0 1px 6px rgba(0,0,0,.45))}
  .navright{display:flex;align-items:center}
  .menu{position:absolute;left:50%;transform:translateX(-50%);
    display:flex;gap:2px;list-style:none;white-space:nowrap}
  .menu a{display:block;padding:10px 17px;font-size:15px;color:#fff;font-weight:600;
    letter-spacing:.02em;transition:text-shadow .25s;text-shadow:0 1px 10px rgba(0,0,0,.4)}
  .menu a:hover{text-shadow:0 0 22px rgba(255,255,255,.9),0 1px 8px rgba(0,0,0,.3)}
  .menu a.active{text-shadow:0 0 18px rgba(255,255,255,.65)}
  .burger{display:none;background:none;border:none;font-size:26px;color:#fff;cursor:pointer}

  /* ── HERO ── */
  .hero{padding:calc(var(--nav-h) + 70px) 48px 44px}
  .hero h1{font-family:var(--display);font-style:normal;font-weight:600;
    font-size:clamp(44px,6vw,90px);letter-spacing:.01em;line-height:.9;color:#fff}
  .hero p{margin-top:18px;font-size:15px;color:var(--soft);
    letter-spacing:.03em;max-width:480px;line-height:1.6}

  /* ── GALLERY GRID ── */
  .gallery{
    padding:8px 48px 120px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:52px;
    width:100%;
  }

  /* tile */
  .gi{position:relative;aspect-ratio:4/3;overflow:hidden;
    cursor:pointer;background:#1a1a1a;border-radius:3px}
  .gi img{
    width:100%;height:100%;object-fit:cover;
    filter:grayscale(1) brightness(.86);
    transition:filter .6s cubic-bezier(.25,.46,.45,.94),
               transform .7s cubic-bezier(.25,.46,.45,.94);
    will-change:transform,filter;
  }
  .gi:hover img{filter:grayscale(0) brightness(1);transform:scale(1.04)}

  /* photo count badge */
  .gi-badge{
    position:absolute;top:12px;right:12px;z-index:2;
    background:rgba(0,0,0,.52);border:1px solid rgba(255,255,255,.25);
    color:rgba(255,255,255,.9);font-size:10px;letter-spacing:.08em;
    padding:4px 9px;border-radius:2px;pointer-events:none;
  }

  /* hover label */
  .gi-label{
    position:absolute;left:0;right:0;bottom:0;
    padding:36px 18px 14px;
    background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 100%);
    opacity:0;transition:opacity .35s;pointer-events:none;
  }
  .gi:hover .gi-label{opacity:1}
  .gi-label span{font-family:var(--display);font-style:normal;
    font-weight:500;font-size:17px;color:#fff;letter-spacing:.02em}

  /* ── LIGHTBOX ── */
  .lb{
    position:fixed;inset:0;z-index:100;
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .3s ease;
  }
  .lb.open{opacity:1;pointer-events:all}

  .lb-bg{
    position:absolute;inset:0;
    background:rgba(13,13,13,.3);
    backdrop-filter:blur(36px) brightness(.72);
    -webkit-backdrop-filter:blur(36px) brightness(.72);
  }

  /* close */
  .lb-close{
    position:absolute;top:22px;right:26px;z-index:103;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
    border-radius:50%;width:40px;height:40px;
    font-size:17px;color:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s;
  }
  .lb-close:hover{background:rgba(255,255,255,.18)}

  /* side arrows */
  .lb-arr{
    position:absolute;top:50%;transform:translateY(-50%);
    z-index:103;cursor:pointer;background:transparent;
    border:none;border-radius:3px;
    color:#fff;font-family:var(--display);font-size:68px;line-height:1;
    width:64px;height:120px;opacity:.6;
    display:flex;align-items:center;justify-content:center;
    transition:opacity .2s,transform .15s;user-select:none;
  }
  .lb-arr:hover{background:transparent;opacity:1;transform:translateY(-50%) scale(1.06)}
  .lb-prev{left:24px}
  .lb-next{right:24px}

  /* image frame */
  .lb-frame{
    position:relative;z-index:101;
    display:flex;flex-direction:column;
    max-width:96vw;max-height:96vh;
    overflow:hidden;border-radius:3px;
    box-shadow:0 60px 130px rgba(0,0,0,.8);
    transform:scale(.94);
    transition:transform .38s cubic-bezier(.25,.46,.45,.94);
  }
  .lb.open .lb-frame{transform:scale(1)}

  .lb-img{
    display:block;height:auto;
    width:min(96vw, calc((96vh - 72px) * 1.6));
    aspect-ratio:16 / 10;
    object-fit:cover;
    transition:opacity .22s ease;
  }
  .lb-img.fading{opacity:0}

  /* dark strip */
  .lb-strip{
    flex-shrink:0;background:#181818;
    padding:14px 24px;
    display:flex;flex-direction:column;align-items:flex-start;
    border-top:1px solid rgba(255,255,255,.07);
    gap:10px;
  }
  .lb-dots{display:flex;align-items:center;gap:8px}
  .lb-dots button{width:7px;height:7px;padding:0;border:none;border-radius:50%;
    background:rgba(255,255,255,.3);cursor:pointer;
    transition:background .25s,transform .25s}
  .lb-dots button.on{background:#fff;transform:scale(1.3)}
  .lb-strip-row{display:flex;align-items:baseline;justify-content:flex-start;gap:16px}
  .lb-strip h2{
    font-family:var(--display);font-style:normal;font-weight:600;
    font-size:clamp(15px,1.8vw,20px);color:#fff;white-space:nowrap;
  }
  .lb-strip .lb-meta{
    font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;
    color:rgba(255,255,255,.45);white-space:nowrap;
  }

  @media(max-width:900px){
    .nav{padding:0 22px;height:70px;--nav-h:70px}
    .menu{display:none}.burger{display:block}
    .hero{padding:calc(70px + 44px) 24px 28px}
    .gallery{grid-template-columns:repeat(2,1fr);padding:6px 20px 80px;gap:16px}
    .lb-arr{width:44px;height:88px;font-size:48px}
    .lb-prev{left:8px}.lb-next{right:8px}
    .lb-frame,.lb-img{max-width:96vw}
  }
  @media(max-width:540px){.gallery{grid-template-columns:1fr}}

  /* ── MOBILE MENU OVERLAY ── */
  .mob{position:fixed;inset:0;z-index:200;
    background:rgba(4,4,4,.93);
    backdrop-filter:blur(28px) saturate(.4);
    -webkit-backdrop-filter:blur(28px) saturate(.4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .3s ease}
  .mob.open{opacity:1;pointer-events:all}
  .mob-x{position:absolute;top:clamp(18px,3vw,28px);right:clamp(20px,3vw,32px);
    background:none;border:none;color:rgba(255,255,255,.5);
    font-size:28px;cursor:pointer;line-height:1;transition:color .2s,transform .2s}
  .mob-x:hover{color:#fff;transform:rotate(90deg)}
  .mob-links{display:flex;flex-direction:column;align-items:center;gap:4px}
  .mob-links a{font-family:var(--display);font-style:italic;font-weight:300;
    font-size:clamp(38px,9vw,72px);color:rgba(255,255,255,.55);
    letter-spacing:.02em;line-height:1.25;transition:color .2s,letter-spacing .25s}
  .mob-links a:hover,.mob-links a.active{color:#fff;letter-spacing:.04em}
  .mob-rule{width:40px;height:1px;background:var(--gold);opacity:.5;margin:18px auto}
  .mob-logo{padding:0!important}
  .mob-logo img{height:64px;width:auto;margin-bottom:10px;filter:drop-shadow(0 1px 6px rgba(0,0,0,.5))}
  /* keep navbar fonts as-is */
  .menu a,.burger{font-family:'SF Pro Display','Helvetica Neue','Segoe UI',Arial,sans-serif}
  .mob-links a{font-family:'Cormorant Garamond',serif}
</style>
</head>
<body>

<nav class="nav" id="sitenav">
  <a class="brand" href="index.html">
    <img src="assets/logo-white.png" alt="Pen and Ink">
  </a>
  <ul class="menu">
    <li><a href="about.html">Our Philosophy</a></li>
    <li><a href="our-work.html" class="active">Our Work</a></li>
    <li><a href="contact.html">Our Studio</a></li>
  </ul>
  <div class="navright"><button class="burger">&#9776;</button></div>
</nav>

<!-- MOBILE MENU -->
<div class="mob" id="mob">
  <nav class="mob-links">
    <a href="index.html" class="mob-logo"><img src="assets/logo-white.png" alt="Pen and Ink"></a>
    <div class="mob-rule"></div>
    <a href="about.html">Our Philosophy</a>
    <a href="our-work.html" class="active">Our Work</a>
    <a href="contact.html">Our Studio</a>
  </nav>
</div>

<section class="hero">
  <h1>Our Work</h1>
  <p>A selected portfolio across architecture, interiors, and urbanism — spaces drawn from lived experience, built with precision.</p>
</section>

<section class="gallery" id="gallery"></section>

<!-- LIGHTBOX -->
<div class="lb" id="lb" role="dialog" aria-modal="true">
  <div class="lb-bg" id="lb-bg"></div>
  <button class="lb-arr lb-prev" id="lb-prev">&#8249;</button>
  <button class="lb-arr lb-next" id="lb-next">&#8250;</button>
  <figure class="lb-frame">
    <img id="lb-img" src="" alt="" class="lb-img">
    <div class="lb-strip">
      <div class="lb-dots" id="lb-dots"></div>
      <div class="lb-strip-row">
        <h2 id="lb-name"></h2>
        <span class="lb-meta" id="lb-meta"></span>
      </div>
    </div>
  </figure>
</div>

<script>
// Mobile menu
(function(){
  const mob=document.getElementById('mob');
  document.querySelector('.burger').addEventListener('click',()=>mob.classList.add('open'));
  mob.addEventListener('click',e=>{if(e.target===mob)mob.classList.remove('open');});
})();
['contextmenu','dragstart'].forEach(ev=>document.addEventListener(ev,e=>{if(e.target.tagName==='IMG')e.preventDefault();}));

const P = 'assets/projects/';
const projects = [
  { name:'Bishop Garden Residence', type:'Architecture',   city:'Chennai',    year:'2025',
    imgs:[P+'bishop-garden/1.jpg',P+'bishop-garden/2.jpg'] },
  { name:'The Kanathur Residence',  type:'Architecture',   city:'Kanathur',   year:'2026',
    imgs:[P+'kanathur-residence/1.jpg',P+'kanathur-residence/2.jpg',P+'kanathur-residence/3.jpg',P+'kanathur-residence/4.jpg'] },
  { name:'Utsav Banquet Hall',      type:'Interiors',      city:'Chennai',    year:'2026',
    imgs:[P+'utsav-banquet-hall/1.jpg',P+'utsav-banquet-hall/2.jpg',P+'utsav-banquet-hall/3.jpg',P+'utsav-banquet-hall/4.jpg',P+'utsav-banquet-hall/5.jpg',P+'utsav-banquet-hall/6.jpg'] },
  { name:'Institutional Campus',    type:'Institutional',  city:'Chennai',    year:'2026',
    imgs:[P+'institutional-campus/1.jpg',P+'institutional-campus/2.jpg',P+'institutional-campus/3.jpg',P+'institutional-campus/4.jpg',P+'institutional-campus/5.jpg',P+'institutional-campus/6.jpg',P+'institutional-campus/7.jpg',P+'institutional-campus/8.jpg',P+'institutional-campus/9.jpg'] },
  { name:'Kumaran Sports Complex',  type:'Urbanism',       city:'Dindigul',   year:'2025',
    imgs:[P+'kumaran-sports-complex/1.jpg'] },
  { name:'Murali Villa',            type:'Architecture',   city:'Chennai',    year:'2025',
    imgs:[P+'murali-villa/1.jpg',P+'murali-villa/2.jpg'] },
  { name:'Padappai Residence',      type:'Architecture',   city:'Padappai',   year:'2026',
    imgs:[P+'padappai-residence/1.jpg',P+'padappai-residence/2.jpg'] },
  { name:'Palavakkam Padel Club',   type:'Interiors',      city:'Palavakkam', year:'2026',
    imgs:[P+'palavakkam-padel/1.jpg',P+'palavakkam-padel/2.jpg',P+'palavakkam-padel/3.jpg',P+'palavakkam-padel/4.jpg',P+'palavakkam-padel/5.jpg'] },
  { name:'Panaiyur Residence',      type:'Architecture',   city:'Panaiyur',   year:'2025',
    imgs:[P+'panaiyur-residence/1.jpg',P+'panaiyur-residence/2.jpg',P+'panaiyur-residence/3.jpg',P+'panaiyur-residence/4.jpg',P+'panaiyur-residence/5.jpg',P+'panaiyur-residence/6.jpg',P+'panaiyur-residence/7.jpg',P+'panaiyur-residence/8.jpg',P+'panaiyur-residence/9.jpg',P+'panaiyur-residence/10.jpg',P+'panaiyur-residence/11.jpg',P+'panaiyur-residence/12.jpg',P+'panaiyur-residence/13.jpg'] },
  { name:'Parisudh Eco Concepts',   type:'Architecture',   city:'SIPCOT',     year:'2025',
    imgs:[P+'parisudh-eco-concepts/1.jpg'] },
  { name:'Proposed Development',    type:'Architecture',   city:'Chennai',    year:'2026',
    imgs:[P+'proposed-development/1.jpg',P+'proposed-development/2.jpg',P+'proposed-development/3.jpg',P+'proposed-development/4.jpg'] },
  { name:'Ethereal Earth',          type:'Interiors',      city:'Bangalore',  year:'2025',
    imgs:[P+'ethereal-earth/1.jpg',P+'ethereal-earth/2.jpg',P+'ethereal-earth/3.jpg',P+'ethereal-earth/4.jpg',P+'ethereal-earth/5.jpg',P+'ethereal-earth/6.jpg'] },
  { name:'The QSR Pavilion',        type:'Commercial',     city:'Chennai',    year:'2025',
    imgs:[P+'qsr-pavilion/1.jpg',P+'qsr-pavilion/2.jpg',P+'qsr-pavilion/3.jpg',P+'qsr-pavilion/4.jpg',P+'qsr-pavilion/5.jpg',P+'qsr-pavilion/6.jpg'] },
  { name:'Rela Hospital',           type:'Institutional',  city:'Chromepet',  year:'2025',
    imgs:[P+'rela-hospital/1.jpg',P+'rela-hospital/2.jpg',P+'rela-hospital/3.jpg',P+'rela-hospital/4.jpg'] },
];

// ── Build grid ──
const gal = document.getElementById('gallery');
projects.forEach((p, pi) => {
  const d = document.createElement('div');
  d.className = 'gi';
  d.innerHTML = `
    <img src="${p.imgs[0]}" alt="${p.name}" loading="lazy">
    <div class="gi-label"><span>${p.name}</span></div>`;
  d.addEventListener('click', () => openLb(pi, 0));
  gal.appendChild(d);
});

// ── Lightbox state ──
const lb     = document.getElementById('lb');
const lbImg  = document.getElementById('lb-img');
const lbName = document.getElementById('lb-name');
const lbMeta = document.getElementById('lb-meta');
const lbDots = document.getElementById('lb-dots');
const lbPrev = document.getElementById('lb-prev');
const lbNext = document.getElementById('lb-next');

let cur = { pi:0, ii:0 };

function showImg(pi, ii, dir=0) {
  const p = projects[pi];
  const total = p.imgs.length;
  ii = (ii + total) % total;
  cur = { pi, ii };

  // fade transition
  if (dir !== 0) {
    lbImg.classList.add('fading');
    setTimeout(() => {
      lbImg.src = p.imgs[ii];
      lbImg.alt = p.name;
      lbImg.classList.remove('fading');
    }, 180);
  } else {
    lbImg.src = p.imgs[ii];
    lbImg.alt = p.name;
  }

  lbName.textContent = p.name;
  lbMeta.textContent = p.type + ' · ' + p.city + ' · ' + p.year;

  // dots above the name
  lbDots.innerHTML = '';
  for (let k = 0; k < total; k++) {
    const dot = document.createElement('button');
    dot.className = k === ii ? 'on' : '';
    dot.setAttribute('aria-label', 'Photo ' + (k + 1));
    dot.addEventListener('click', e => { e.stopPropagation(); showImg(cur.pi, k, k > cur.ii ? 1 : -1); });
    lbDots.appendChild(dot);
  }
  lbDots.style.display = total > 1 ? 'flex' : 'none';

  // hide arrows if only one image
  const vis = total > 1 ? 'flex' : 'none';
  lbPrev.style.display = vis;
  lbNext.style.display = vis;
}

function openLb(pi, ii) {
  showImg(pi, ii);
  lb.classList.add('open');
  document.body.classList.add('lb-open');
  document.body.style.overflow = 'hidden';
}

function closeLb() {
  lb.classList.remove('open');
  document.body.classList.remove('lb-open');
  document.body.style.overflow = '';
}

lbPrev.addEventListener('click', e => { e.stopPropagation(); showImg(cur.pi, cur.ii - 1, -1); });
lbNext.addEventListener('click', e => { e.stopPropagation(); showImg(cur.pi, cur.ii + 1,  1); });
document.getElementById('lb-bg').addEventListener('click', closeLb);
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowRight') showImg(cur.pi, cur.ii + 1,  1);
  if (e.key === 'ArrowLeft')  showImg(cur.pi, cur.ii - 1, -1);
});

// touch swipe
let tx = 0;
lb.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
lb.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) showImg(cur.pi, cur.ii + (dx < 0 ? 1 : -1), dx < 0 ? 1 : -1);
}, {passive:true});
</script>
</body>
</html>
